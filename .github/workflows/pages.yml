name: Deploy runningbom Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: JavaScript 문법 검사
        run: node --check outputs/pushrun-site/app.js && node --check outputs/pushrun-site/family-analytics.js && node --check outputs/pushrun-site/family-shell.js && node --check outputs/pushrun-site/sw.js && node --check outputs/pushrun-site/alerts-core.js && node --check outputs/pushrun-site/race-calendar-core.js
      - name: 정적 자산·대회 데이터 검사
        run: npm test
      - name: 네이티브 의존성 설치
        run: npm --prefix apps/mobile ci
      - name: Android·iOS 네이티브 검증
        run: npm --prefix apps/mobile run check && npm --prefix apps/mobile run export:native
      - name: Production dependency audit
        run: npm run audit:prod

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 운영 빌드 식별자 기록
        shell: bash
        run: |
          mkdir -p .pages-release
          cp -a outputs/pushrun-site/. .pages-release/
          sed -i "s/__BUILD_SHA__/${GITHUB_SHA::7}/g" .pages-release/app.js

      - name: Deploy static site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .pages-release
